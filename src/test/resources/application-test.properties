
# Test profile  usado por @ActiveProfiles("test") em CalendarE2ETest


# Isolated in-memory H2 database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

app.base-url=http://localhost:8080

# Discovery providers desativados em testes E2E (sem API keys reais)
app.discover.ticketmaster.api-key=
app.discover.ticketmaster.country-code=PT
app.discover.seatgeek.client-id=

spring.main.banner-mode=off
logging.level.root=WARN
logging.level.com.example=INFO